# Bu iş akışı, GitHub Pages'a statik içerik dağıtmak için kullanılır.
name: Deploy Lovable AI Project to Pages

on:
  # main branch'e yapılan push'larda çalışır
  push:
    branches: ["main"]
  # Manuel çalıştırmaya izin verir
  workflow_dispatch:

# Dağıtım için gerekli izinleri ayarlar
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek bir dağıtıma izin verir
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Lovable AI projesi için yeterli versiyon
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Project
        run: npm run build # Projeyi derle ve /dist klasörünü oluştur

      # GitHub Pages Dağıtım Adımları
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Derlenmiş dosyaların olduğu klasör
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
